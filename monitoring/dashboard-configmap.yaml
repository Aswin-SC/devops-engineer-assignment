apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-assignment-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  devops-assignment-dashboard.json: |-
    {
      "title": "DevOps Assignment Platform",
      "uid": "devops-assignment-platform",
      "schemaVersion": 39,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Cluster CPU Utilization",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [{ "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)" }]
        },
        {
          "id": 2,
          "title": "Cluster Memory Utilization",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [{ "expr": "(1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100" }]
        },
        {
          "id": 3,
          "title": "Pod Restarts",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [{ "expr": "sum(kube_pod_container_status_restarts_total)" }]
        },
        {
          "id": 4,
          "title": "Application Availability",
          "type": "stat",
          "datasource": "Prometheus",
          "targets": [{ "expr": "up{job=\"api\"}" }]
        },
        {
          "id": 5,
          "title": "Application Response Time",
          "type": "timeseries",
          "datasource": "Prometheus",
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[5m])) by (le))" }]
        },
        {
          "id": 6,
          "title": "Application Logs",
          "type": "logs",
          "datasource": "Loki",
          "targets": [{ "expr": "{namespace=\"devops-assignment\"}" }]
        }
      ]
    }
